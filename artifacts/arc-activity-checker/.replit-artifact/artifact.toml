kind = "web"
previewPath = "/"
title = "Arc Activity Checker"
version = "1.0.0"
id = "artifacts/arc-activity-checker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20347

[services.development]
run = "pnpm --filter @workspace/arc-activity-checker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arc-activity-checker", "run", "build" ]
publicDir = "artifacts/arc-activity-checker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20347"
BASE_PATH = "/"
